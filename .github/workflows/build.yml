name: Android CI Build

# 触发条件：当你推送（push）代码到仓库时，或者手动在网页点击运行
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: 

jobs:
  build:
    # 使用 GitHub 提供的最新 Ubuntu 虚拟机
    runs-on: ubuntu-latest

    steps:
    - name: 1. 拉取代码
      uses: actions/checkout@v4

    - name: 2. 配置 JDK 17 环境
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        # 开启缓存功能，下次编译会快很多
        cache: gradle

    - name: 3. 检查并授予脚本执行权限
      run: chmod +x gradlew

    - name: 4. 开始编译 (Debug APK)
      # --stacktrace 可以在出错时显示详细错误，方便我帮你诊断
      run: ./gradlew assembleDebug --stacktrace

    - name: 5. 提取并上传生成的 APK
      uses: actions/upload-artifact@v4
      with:
        name: ServerApp-Release-Package
        # 这是 Gradle 默认生成 APK 的路径
        path: app/build/outputs/apk/debug/*.apk
        # 产物保留 7 天
        retention-days: 7
